<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Quest</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="wrapper">
      <h1>Tic Tac Toe</h1>
    </div>
    <div class="wrapper game-board">
      <button class="0 field"></button>
      <button class="1 field"></button>
      <button class="2 field"></button>
      <button class="3 field"></button>
      <button class="4 field"></button>
      <button class="5 field"></button>
      <button class="6 field"></button>
      <button class="7 field"></button>
      <button class="8 field"></button>
    </div>
    <div class="wrapper">
      <button class="reset">New Game</button>
    </div>
  </body>
</html>
